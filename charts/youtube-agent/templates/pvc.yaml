{{- if .Values.storage.data.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "youtube-agent.fullname" . }}-data
  labels:
    {{- include "youtube-agent.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.storage.data.storageClass }}
  storageClassName: {{ .Values.storage.data.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.data.size }}
{{- end }}
---
{{- if .Values.storage.reports.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "youtube-agent.fullname" . }}-reports
  labels:
    {{- include "youtube-agent.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.storage.reports.storageClass }}
  storageClassName: {{ .Values.storage.reports.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.reports.size }}
{{- end }}
