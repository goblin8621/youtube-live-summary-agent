apiVersion: v1
kind: Secret
metadata:
  name: {{ include "youtube-agent.fullname" . }}
  labels:
    {{- include "youtube-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  YOUTUBE_API_KEY: {{ .Values.secrets.youtubeApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  NOTION_TOKEN: {{ .Values.secrets.notionToken | quote }}
